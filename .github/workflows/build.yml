name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icons
        run: python scripts/make_icon.py

      - name: Build macOS app
        run: |
          python -m PyInstaller \
            --windowed \
            --onedir \
            --name "markIT" \
            --icon "assets/markIT.icns" \
            --paths src \
            --hidden-import markitdown \
            --hidden-import markitdown._base_converter \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtWidgets \
            --hidden-import PyQt6.QtGui \
            --collect-all markitdown \
            --collect-data magika \
            --noconfirm \
            src/main.py

      - name: Sign app
        run: |
          codesign -s - --force --deep dist/markIT.app

      - name: Build DMG
        run: |
          create-dmg \
            --volname "markIT" \
            --volicon "assets/markIT.icns" \
            --window-pos 200 120 \
            --window-size 560 340 \
            --icon-size 128 \
            --icon "markIT.app" 140 170 \
            --hide-extension "markIT.app" \
            --app-drop-link 420 170 \
            --no-internet-enable \
            "dist/markIT.dmg" \
            "dist/markIT.app"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: markIT-macOS
          path: dist/markIT.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icons
        run: python scripts/make_icon.py

      - name: Build Windows exe
        run: |
          python -m PyInstaller `
            --windowed `
            --onedir `
            --name "markIT" `
            --icon "assets\markIT.ico" `
            --paths src `
            --hidden-import markitdown `
            --hidden-import markitdown._base_converter `
            --hidden-import PyQt6.QtCore `
            --hidden-import PyQt6.QtWidgets `
            --hidden-import PyQt6.QtGui `
            --collect-all markitdown `
            --collect-data magika `
            --noconfirm `
            src\main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: markIT-Windows
          path: dist/markIT/
