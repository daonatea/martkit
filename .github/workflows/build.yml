name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    env:
      HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icons
        run: python scripts/make_icon.py

      - name: Build macOS app (Apple Silicon)
        run: |
          python -m PyInstaller \
            --windowed \
            --onedir \
            --name "markIT" \
            --icon "assets/markIT.icns" \
            --paths src \
            --hidden-import markitdown \
            --hidden-import markitdown._base_converter \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtWidgets \
            --hidden-import PyQt6.QtGui \
            --hidden-import transcribe \
            --collect-all markitdown \
            --collect-all pdfminer \
            --collect-all pdfplumber \
            --collect-all mammoth \
            --collect-all pptx \
            --collect-all olefile \
            --collect-all faster_whisper \
            --collect-all ctranslate2 \
            --collect-all av \
            --collect-data magika \
            --noconfirm \
            src/main.py

      - name: Sign app
        run: codesign -s - --force --deep dist/markIT.app

      - name: Build DMG
        run: |
          create-dmg \
            --volname "markIT" \
            --volicon "assets/markIT.icns" \
            --window-pos 200 120 \
            --window-size 560 340 \
            --icon-size 128 \
            --icon "markIT.app" 140 170 \
            --hide-extension "markIT.app" \
            --app-drop-link 420 170 \
            --no-internet-enable \
            "dist/markIT-macOS-ARM.dmg" \
            "dist/markIT.app"

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: markIT-macOS-ARM
          path: dist/markIT-macOS-ARM.dmg

  build-macos-intel:
    runs-on: macos-15-intel
    env:
      HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icons
        run: python scripts/make_icon.py

      - name: Build macOS app (Intel)
        run: |
          python -m PyInstaller \
            --windowed \
            --onedir \
            --name "markIT" \
            --icon "assets/markIT.icns" \
            --paths src \
            --hidden-import markitdown \
            --hidden-import markitdown._base_converter \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtWidgets \
            --hidden-import PyQt6.QtGui \
            --hidden-import transcribe \
            --collect-all markitdown \
            --collect-all pdfminer \
            --collect-all pdfplumber \
            --collect-all mammoth \
            --collect-all pptx \
            --collect-all olefile \
            --collect-all faster_whisper \
            --collect-all ctranslate2 \
            --collect-all av \
            --collect-data magika \
            --noconfirm \
            src/main.py

      - name: Sign app
        run: codesign -s - --force --deep dist/markIT.app

      - name: Build DMG
        run: |
          create-dmg \
            --volname "markIT" \
            --volicon "assets/markIT.icns" \
            --window-pos 200 120 \
            --window-size 560 340 \
            --icon-size 128 \
            --icon "markIT.app" 140 170 \
            --hide-extension "markIT.app" \
            --app-drop-link 420 170 \
            --no-internet-enable \
            "dist/markIT-macOS-Intel.dmg" \
            "dist/markIT.app"

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: markIT-macOS-Intel
          path: dist/markIT-macOS-Intel.dmg

  build-windows:
    runs-on: windows-latest
    env:
      HAS_SIGNPATH: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icons
        run: python scripts/make_icon.py

      - name: Build Windows exe
        run: |
          python -m PyInstaller `
            --windowed `
            --onedir `
            --name "markIT" `
            --icon "assets\markIT.ico" `
            --paths src `
            --hidden-import markitdown `
            --hidden-import markitdown._base_converter `
            --hidden-import PyQt6.QtCore `
            --hidden-import PyQt6.QtWidgets `
            --hidden-import PyQt6.QtGui `
            --hidden-import transcribe `
            --collect-all markitdown `
            --collect-all pdfminer `
            --collect-all pdfplumber `
            --collect-all mammoth `
            --collect-all pptx `
            --collect-all olefile `
            --collect-all faster_whisper `
            --collect-all ctranslate2 `
            --collect-all av `
            --collect-data magika `
            --noconfirm `
            src\main.py

      - name: Upload unsigned EXE
        id: upload-unsigned-artifact
        uses: actions/upload-artifact@v7
        with:
          name: markIT-Windows-unsigned
          path: dist/markIT/

      # SignPath code signing — activado cuando SIGNPATH_API_TOKEN esté configurado.
      # Reemplaza REPLACE_WITH_ORG_ID con tu Organization ID de SignPath.io tras la aprobación.
      - name: Sign EXE (SignPath Foundation)
        if: env.HAS_SIGNPATH == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: 'REPLACE_WITH_ORG_ID'
          project-slug: 'markit'
          signing-policy-slug: 'release-signing'
          github-artifact-id: '${{ steps.upload-unsigned-artifact.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'dist/markIT-signed/'

      - name: Zip signed build
        if: env.HAS_SIGNPATH == 'true'
        run: |
          Rename-Item "dist\markIT-signed" "markIT"
          Compress-Archive -Path "dist\markIT" -DestinationPath "dist\markIT-Windows.zip"

      - name: Zip unsigned build (fallback)
        if: env.HAS_SIGNPATH != 'true'
        run: Compress-Archive -Path "dist\markIT" -DestinationPath "dist\markIT-Windows.zip"

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v7
        with:
          name: markIT-Windows
          path: dist/markIT-Windows.zip

  release:
    needs: [build-macos-arm64, build-macos-intel, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "markIT ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/markIT-macOS-ARM/markIT-macOS-ARM.dmg \
            artifacts/markIT-macOS-Intel/markIT-macOS-Intel.dmg \
            artifacts/markIT-Windows/markIT-Windows.zip
