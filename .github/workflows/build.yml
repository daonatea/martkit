name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icons
        run: python scripts/make_icon.py

      - name: Build macOS app
        run: |
          python -m PyInstaller \
            --windowed \
            --onedir \
            --name "markIT" \
            --icon "assets/markIT.icns" \
            --paths src \
            --hidden-import markitdown \
            --hidden-import markitdown._base_converter \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtWidgets \
            --hidden-import PyQt6.QtGui \
            --collect-all markitdown \
            --collect-all pdfminer \
            --collect-all pdfplumber \
            --collect-all mammoth \
            --collect-all pptx \
            --collect-all speech_recognition \
            --collect-all olefile \
            --collect-all youtube_transcript_api \
            --collect-data magika \
            --noconfirm \
            src/main.py

      - name: Sign app
        run: codesign -s - --force --deep dist/markIT.app

      - name: Build DMG
        run: |
          create-dmg \
            --volname "markIT" \
            --volicon "assets/markIT.icns" \
            --window-pos 200 120 \
            --window-size 560 340 \
            --icon-size 128 \
            --icon "markIT.app" 140 170 \
            --hide-extension "markIT.app" \
            --app-drop-link 420 170 \
            --no-internet-enable \
            "dist/markIT.dmg" \
            "dist/markIT.app"

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: markIT-macOS
          path: dist/markIT.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate icons
        run: python scripts/make_icon.py

      - name: Build Windows exe
        run: |
          python -m PyInstaller `
            --windowed `
            --onedir `
            --name "markIT" `
            --icon "assets\markIT.ico" `
            --paths src `
            --hidden-import markitdown `
            --hidden-import markitdown._base_converter `
            --hidden-import PyQt6.QtCore `
            --hidden-import PyQt6.QtWidgets `
            --hidden-import PyQt6.QtGui `
            --collect-all markitdown `
            --collect-all pdfminer `
            --collect-all pdfplumber `
            --collect-all mammoth `
            --collect-all pptx `
            --collect-all speech_recognition `
            --collect-all olefile `
            --collect-all youtube_transcript_api `
            --collect-data magika `
            --noconfirm `
            src\main.py

      - name: Upload unsigned EXE
        id: upload-unsigned-artifact
        uses: actions/upload-artifact@v7
        with:
          name: markIT-Windows-unsigned
          path: dist/markIT/

      # SignPath code signing — requires secrets configured after SignPath Foundation approval:
      #   SIGNPATH_API_TOKEN  → API token with Submitter role (add in repo Settings → Secrets)
      # Replace the placeholder values below with your actual SignPath organization/project/policy slugs.
      - name: Sign EXE (SignPath Foundation)
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: 'REPLACE_WITH_ORG_ID'
          project-slug: 'markit'
          signing-policy-slug: 'release-signing'
          github-artifact-id: '${{ steps.upload-unsigned-artifact.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'dist/markIT-signed/'

      - name: Upload signed EXE
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: markIT-Windows
          path: dist/markIT-signed/

      - name: Upload EXE (fallback when unsigned)
        if: ${{ secrets.SIGNPATH_API_TOKEN == '' }}
        uses: actions/upload-artifact@v7
        with:
          name: markIT-Windows
          path: dist/markIT/
